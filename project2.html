<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wishlist Hub for Gifting</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f5f5f5;
            text-align: center;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: auto;
        }

        input,
        select {
            padding: 10px;
            margin: 5px;
            width: 250px;
        }

        button {
            padding: 10px 15px;
            cursor: pointer;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
        }

        .wishlist {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
        }

        .card {
            width: 220px;
            background: white;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
            padding: 10px;
        }

        .card img {
            width: 100%;
            height: 150px;
            object-fit: cover;
            border-radius: 8px;
        }

        .high {
            color: red;
            font-weight: bold;
        }

        .medium {
            color: orange;
            font-weight: bold;
        }

        .low {
            color: green;
            font-weight: bold;
        }

        .delete-btn {
            background: red;
            margin-top: 10px;
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>🎁 Wishlist Hub for Gifting</h1>

        <input type="text" id="giftName" placeholder="Gift Name">

        <input type="text" id="imageLink" placeholder="Image URL">

        <select id="priority">
            <option value="High">High Priority</option>
            <option value="Medium">Medium Priority</option>
            <option value="Low">Low Priority</option>
        </select>

        <br>
        <button onclick="addGift()">Add Gift</button>

        <div class="wishlist" id="wishlist"></div>
    </div>

    <script>
        function addGift() {

            const giftName =
                document.getElementById("giftName").value;

            const imageLink =
                document.getElementById("imageLink").value;

            const priority =
                document.getElementById("priority").value;

            if (giftName === "" || imageLink === "") {
                alert("Please fill all fields");
                return;
            }

            const wishlist =
                document.getElementById("wishlist");

            const card =
                document.createElement("div");

            card.classList.add("card");

            let priorityClass = priority.toLowerCase();

            card.innerHTML = `
        <img src="${imageLink}" alt="${giftName}">
        <h3>${giftName}</h3>
        <p class="${priorityClass}">
            Priority: ${priority}
        </p>
        <button class="delete-btn"
            onclick="this.parentElement.remove()">
            Delete
        </button>
    `;

            wishlist.appendChild(card);

            document.getElementById("giftName").value = "";
            document.getElementById("imageLink").value = "";
        }
    </script>

</body>

</html>
